services:
  - type: web
    name: vdrw
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd backend && daphne -b 0.0.0.0 -p $PORT vdrw.asgi:application"
    envVars:
      - key: DEBUG
        value: "False"